# 量化研究工具 · 全局配置
# 三条铁律：校准而非预测 / 永远对比无条件基准 / 反过拟合优先

# ---------------------------------------------------------------------------
# 股票池
# ---------------------------------------------------------------------------
universe:
  # ⚠️ 当前为「幸存者偏差版本」，仅供 API 验证（Phase 1）。
  #    含已退市标的的无幸存者偏差股票池见 Phase 6。
  default: spy_demo
  spy_demo:
    description: "SPY + 少量成分股，仅供跑通流程，存在幸存者偏差"
    tickers: [SPY, AAPL, MSFT, JNJ, JPM, XOM, PG, KO, WMT, GE]
  mag7:
    description: "七姐妹，高相关大盘股，用于个股进出场规则池化研究（补充规格 A）"
    tickers: [AAPL, MSFT, GOOGL, AMZN, NVDA, META, TSLA]
  diversified:
    # 降低「选股偏差」：在 7 个十年大赢家之外，混入大量十年走平/下跌的大盘股
    # （INTC/PYPL/BA/WBA/T/VZ/F/GE/PFE/DIS/NKE/MMM… 逢跌买在这些上常吃瘪），
    # 让回测不再只在「已知赢家」上做，结论更接近真实期望。
    # ⚠️ 仍**非真·无幸存者偏差**：已退市/破产标的(Lehman/Nortel/WorldCom…)的历史价格
    #    需付费 PIT 数据(CRSP/Sharadar)，免费 yfinance 取不到。本池只是大幅降低偏差，
    #    不能消除「这些公司至少活到今天」这层幸存。
    description: "降低选股偏差的宽池(赢家+大量走平/下跌大盘股)；非真·无幸存者偏差(需付费PIT)"
    tickers: [AAPL, MSFT, GOOGL, AMZN, NVDA, META, TSLA,
              INTC, CSCO, IBM, ORCL, QCOM, TXN, HPQ, DELL,
              PYPL, T, VZ, CMCSA,
              F, GM, GE, BA, MMM, CAT,
              KO, PG, JNJ, PFE, MRK, BMY, CVS, WBA,
              XOM, CVX, WMT, HD, NKE, SBUX, MCD, DIS,
              C, BAC, WFC, JPM]

# ---------------------------------------------------------------------------
# 日期范围
# ---------------------------------------------------------------------------
dates:
  start: "2000-01-01"
  end: null            # null = 取到今天

# ---------------------------------------------------------------------------
# 交易成本（回测用）
# ---------------------------------------------------------------------------
costs:
  fees: 0.0005         # 单边手续费 5bps
  slippage: 0.0005     # 单边滑点 5bps

# ---------------------------------------------------------------------------
# 因子参数
# ---------------------------------------------------------------------------
factors:
  momentum_12_1:
    lookback: 252      # 约 12 个月
    skip: 21           # 剔除最近约 1 个月
  short_reversal:
    lookback: 21
  low_volatility:
    windows: [60, 120]
  trend:
    ma_window: 200

# ---------------------------------------------------------------------------
# 评估参数
# ---------------------------------------------------------------------------
evaluation:
  quantiles: 5
  periods: [1, 5, 21, 63]

# ---------------------------------------------------------------------------
# 建仓概率引擎（regime）参数
# ---------------------------------------------------------------------------
regime:
  drawdown_threshold: 0.10      # 距前高 >10% 视为回撤中
  horizons: [21, 63, 126, 252, 504]
  valuation_terciles: 3

# ---------------------------------------------------------------------------
# 宏观数据
#   优先级：有 fred_api_key → FRED 官方 API 全历史；否则 yahoo_proxy 回退。
#   申请免费 key：https://fred.stlouisfed.org/docs/api/api_key.html
#   填入下方 fred_api_key 或设环境变量 FRED_API_KEY（环境变量优先）即自动启用。
# ---------------------------------------------------------------------------
macro:
  fred_api_key: null   # ⚠️ 切勿在此硬编码 key（会随 git 泄露）。用环境变量 FRED_API_KEY 或 Streamlit secrets 注入；留空则自动回退 ETF 代理宏观。
  series:
    credit_spread:
      # BAA10Y = Moody's Baa 公司债收益率 − 10Y 国债，日频 1986+，本身即信用利差。
      # （ICE BofA 的 BAMLH0A0HYM2 是授权数据，FRED API 仅给最近 3 年，故不用。）
      fred: BAA10Y
      yahoo_proxy:
        tickers: ["HYG", "IEF"]  # 回退：-(HYG/IEF)，HY 相对国债走弱=信用走阔
        op: neg_ratio
        note: "ETF 代理，非真利差，2007+ 才有；仅在无 FRED key 时使用"
    yield_curve:
      fred: T10Y2Y              # 10Y - 2Y 期限利差（有 key 时用）
      yahoo_proxy:
        tickers: ["^TNX", "^IRX"]  # 回退：^TNX(10Y) - ^IRX(13周≈3M) = 10Y-3M
        op: diff
        note: "10Y-3M，与 FRED 的 10Y-2Y 口径略异，2000+"
    # cape / earnings_yield: 后期接入
  fred_max_retries: 4
  fred_timeout: 25

# ---------------------------------------------------------------------------
# 反过拟合基建参数
# ---------------------------------------------------------------------------
stats:
  bootstrap:
    block_size: 21    # 块自助法块长（约 1 个月）
    n_resamples: 1000
  walk_forward:
    train: 1260       # 约 5 年
    test: 252         # 约 1 年
    step: 252

# ---------------------------------------------------------------------------
# 个股进出场规则研究（补充规格 A：S1–S3）
# ---------------------------------------------------------------------------
single_name:
  universe: mag7
  entry:                       # 入场信号默认参数（可组合，组合数计入多重检验）
    dip_from_high: {lookback: 252, pct: 0.15}
    ma_cross: {fast: 50, slow: 200}
    rsi_oversold: {window: 14, level: 30}
  exit:                        # 出场规则默认参数
    take_profit: 0.25
    stop_loss: 0.15
    trailing_stop: 0.20
    time_stop: 63
  eval:
    max_hold: 252              # 逐笔交易最长持有（兜底时间止损）
    n_boot: 1000

# ---------------------------------------------------------------------------
# 路径
# ---------------------------------------------------------------------------
paths:
  cache: data/cache
  reports: reports
